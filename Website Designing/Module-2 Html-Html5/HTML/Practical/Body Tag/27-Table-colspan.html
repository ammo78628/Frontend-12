<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            border-collapse: collapse;
        }
        tr,th,td{
            text-align: center;
        }
        input[type="submit"]{
            width: 100px;
            height: 50px;
            margin-right: 20px;
            background-color: black;
            border: none;
            color: white;
            cursor: pointer;
             font-family: monospace;
            font-size: 20px;
        }
        input[type="reset"]{
            width: 100px;
            height: 50px;
            background-color: black;
            border: none;
            color: white;
            cursor: pointer;
            font-family: monospace;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <table border="1" align="center" cellpadding="10">
         <tr>
            <th colspan="2" style="font-size: 30px;">Login Form</th>
        </tr>
        <tr>
            <th>Email</th>
            <td><input type="email" required></td>
        </tr>
        <tr>
            <th>Password</th>
            <td><input type="Password" required></td>
        </tr>
        <tr>
            <td colspan="2" align="center"><input type="submit"><input type="reset"></td>
        </tr>
    </table>
</body>
</html>
