<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            padding: 0;
            margin: 0;
            background-image: url(https://plus.unsplash.com/premium_photo-1661884072874-e1efc8f4b0d7?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8bmF0dXJlJTIwZ3JlZW58ZW58MHx8MHx8fDA%3D);
            background-size: cover;
            background-color: black;
        }
        form{
            width: 310px;
            height: 420px;
            border: 2px solid white;
            border-radius: 20px;
            margin: auto;
            color: white;
            background-color: transparent;
            backdrop-filter: blur(10px);
            box-shadow: 0px 0px 10px white;
            margin-top: 7%;
        }
        h1{
            text-align: center;
        }
        input{
            background-color: transparent;
            border: none;
            border-bottom: 1px solid white;
            margin: 5px;
            color: rgb(255, 255, 255);
        }
         input::placeholder{
            color: rgba(255, 255, 255, 0.767);
        }
        input:focus{
            outline: none;
        }
        h4{
            display: inline-block;
            margin-left: 30px;
        }
        input[type="submit"]{
            background-color: rgb(105, 99, 99);
            margin-left: 48px;
            margin-top: 15px;
            height: 50px;
            width: 100px;
            cursor: pointer;
            transition: all 100ms ease-in-out;
            border: none;
            border-radius: 50px;
        }
         input[type="reset"]{
            background-color: tomato;
            height: 50px;
            width: 100px;
            cursor: pointer;
            transition: all 100ms ease-in-out;
            border: none;
             border-radius: 50px;
        }
        input[type="submit"]:hover{
            background-color: rgb(0, 0, 0);
        }
         input[type="reset"]:hover{
             background-color: rgb(255, 0, 0);
        }
    </style>
</head>
<body>
    <div>
        <form method="post" action="welcome.html">
                <h1>Sign Up</h1>
            <h4>Name</h4> :<input type="text" placeholder="Enter Your Name*" required><br>
            <h4>E-mail :</h4><input type="email" placeholder="Enter Your Email*" required><br>
            <h4>Phone No :</h4><input type="number" placeholder="Enter Your Number*" required><br>
            <h4>Enter D.O.B :</h4><input type="date" placeholder="Enter Birthdy"><br>
            <input type="submit">
            <input type="reset" value="Reset">
        </form>
    </div>
</body>
</html>
