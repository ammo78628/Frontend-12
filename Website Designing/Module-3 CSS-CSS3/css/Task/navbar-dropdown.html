<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0px;
            padding: 0px;
            overflow-x: hidden;
        }
        nav{
            width: 96%;
            padding: 20px;
            background-color: rgb(44, 180, 180);
            border: 5px solid rgb(60, 223, 223);
            border-radius: 20px;
            font-size: 20px;
            box-shadow: 0px 0px 10px 5px inset rgb(49, 102, 102);
        }
        a
        {
            padding: 10px;
            display: inline-block;
            margin-left:  220px;
            color: white;
            text-decoration: none;
            height: 22px;
            width: 100px;
            text-align: center;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            transition: all 0.2s ease-in-out;
        }
        a:hover{
            background-color: rgb(95, 184, 184);
            box-shadow: 0px 0px 50px 5px inset rgb(37, 82, 82);
            
        }
        select{
            margin-left: 220px;
            padding: 10px;
            color: white;
            height: 40px;
            width: 115px;
            border-radius: 10px;
            background-color: rgb(44, 180, 180);
            border: none;
            font-size: 18px;
        }
        select:hover{
            background-color: rgb(95, 184, 184);
            box-shadow: 0px 0px 50px 5px inset rgb(37, 82, 82);
        }
    </style>
</head>
<body>
    <nav>
            <a href="">About Us</a>
            <select>
                <option value="">Services</option>
                <option>Web Development</option>
                <option>Wordpress</option>
                <option>Graphic Design</option>
                <option>Icon Design</option>
                <option>Motion Graphics</option>
            </select>
            <a href="">Works</a>
    </nav>
</body>
</html>
