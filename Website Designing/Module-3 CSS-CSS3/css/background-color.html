<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='utf-8'>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<title>Beautiful Backgrounds</title>
<link rel='stylesheet' href='main.css'>
<style>
    * {
        box-sizing: border-box;
    }
    html,
    body {
        margin: 0;
        padding: 0;
        min-height: 100%;
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
        color: #111;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 16px;
    }
    #content {
        width: 100%;
        max-width: 1100px;
        display: grid;
        gap: 22px;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }
    .card {
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.65);
        border-radius: 22px;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.14);
        padding: 28px;
        transition: transform 0.25s ease, box-shadow 0.25s ease;
        min-height: 220px;
    }
   
    .card h1 {
        margin: 0 0 14px;
        font-size: 1.6rem;
        letter-spacing: -0.03em;
        color: #1d1d35;
    }
    .card p {
        margin: 0;
        line-height: 1.75;
        color: #333;
    }
    .feature {
        font-weight: 700;
        color: #1f3b72;
    }
    .note {
        display: inline-block;
        margin-top: 16px;
        font-size: 0.95rem;
        color: #4a4a4a;
    }
</style>
</head>
<body>
    <section id="content">
        <div class="card">
         </div>
        <div class="card">
            </div>
        <div class="card">
           </div>
    </section>
</body>
</html>
