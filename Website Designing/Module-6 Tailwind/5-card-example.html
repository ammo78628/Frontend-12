<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Example</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50">
<div class=" card w-100 h-105 bg-white mx-auto rounded-xl mt-25 overflow-hidden relative shadow-2xl">
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTJkl9xcIhIQmML3KRg3ZRenkBUgjQvmoChkQ&s" alt="" class="card-img w-100 h-30 img-fluid object-cover">
    <img src="https://sm.ign.com/ign_in/news/j/james-gunn/james-gunn-throws-cold-water-on-the-batman-video-game-rumor_phjh.jpg" class="w-30 h-30 rounded-full absolute left-35 top-14 border-5 border-white object-cover">
    <div class="text-center mt-18">
            <h1 class="font-bold">Batman</h1>
            <p>I'm Vengeance</p>
    </div>
    <div class="grid grid-cols-3 mt-4 text-center">
        <div>
            <h1 class="font-bold">Post</h1>
            <p>313</p>
        </div>
        <div>
            <h1 class="font-bold">Followers</h1>
            <p>5M</p>
        </div>
        <div>
            <h1 class="font-bold">Likes</h1>
            <p>1B</p>
        </div>
    </div>
    <hr class="w-75 mx-auto border-gray-200 mt-5">
    <a href="https://github.com/ammo78628/Frontend-12/tree/main/Website%20Designing/Module-6%20Tailwind"><button type="button" value="Follow" class="w-35 ms-33 h-10 mt-4 bg-black text-white rounded-full cursor-pointer">Follow</button></a>
</div>
</body>
</html>
